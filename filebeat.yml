filebeat.inputs:
  - type: docker
    containers.path: "/usr/share/filebeat/containers"
    containers.ids:
      - "*"

# -------------------------- Elasticsearch output ------------------------------
output.elasticsearch:
  # Configure via environment variable at runtime to avoid hardcoding endpoints.
  hosts: ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
  index: "dockerlog-%{[beat.version]}-%{+yyyy.MM.dd}"

# template loading is enabled by default
setup.template.enabled: false
